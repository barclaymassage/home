<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book an Appointment | Barclay Massage & Wellness</title>
    <style>
        /* Core Reset & Typography */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #f5f5f7;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Layout Container */
        .booking-card {
            max-width: 500px;
            width: 100%;
            background-color: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        }

        /* Header Style */
        .logo-text {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            display: block;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 14px;
            color: #a1a1a6;
            margin-bottom: 35px;
        }

        /* Premium Action Button */
        .book-btn {
            display: inline-block;
            width: 100%;
            padding: 16px 32px;
            background-color: #ffffff;
            color: #121212;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }
        .book-btn:hover {
            background-color: #e5e5ea;
        }
        .book-btn:active {
            transform: scale(0.98);
        }

        /* Footer Notes */
        footer {
            margin-top: 45px;
            font-size: 11px;
            color: #86868b;
        }
    </style>
</head>
<body>

    <main class="booking-card">
        <a href="/" class="logo-text">Barclay Massage & Wellness</a>
        <p class="subtitle">Schedule your 60-minute or 90-minute therapeutic massage session online.</p>

        <a href="https://cal.com/clay-ahrensfeld-aigtaa" target="_blank" class="book-btn">
            Open Booking Calendar
        </a>

        <footer>
            <p>&copy; 2026 Barclay Massage & Wellness.<br>Licensed Massage Therapy Practice.</p>
        </footer>
    </main>

</body>
</html>
